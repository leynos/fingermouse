name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.5'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends finger
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Spelling
        run: make spelling
      - name: Cache whitaker-installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install the Whitaker Dylint suite
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: lcov.info
          format: lcov
          with-ratchet: 'true'
      # The `mode: check` PR gate is deliberately not wired in yet:
      # CodeScene project 72543 has no coverage-gates configuration, so
      # `cs-coverage check` would fail every run with "HTTP call
      # succeeded, but the received project-config isn't valid. Lacks
      # the gates configuration." — a CodeScene-side per-project
      # setting, not a CI defect (ddlint#287 and chutoro#156 hit the
      # byte-identical error). The previous unguarded `mode: upload`
      # step here is also removed: CodeScene rejects uploads from
      # non-analysed branches, so once CS_ACCESS_TOKEN is set it would
      # fail on every pull request. Coverage is now uploaded only from
      # coverage-main.yml on push to main. Add the check step in a
      # fast-follow PR once coverage-main.yml has uploaded to main at
      # least once and the gate is confirmed to resolve, or once
      # CodeScene confirms the project's coverage gate is enabled.
